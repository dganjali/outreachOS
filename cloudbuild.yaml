# Cloud Build pipeline - builds the API image and deploys to Cloud Run.
# Deploy manually from a clean working tree:
#   CLOUDSDK_PYTHON=python3.10 gcloud builds submit --config=cloudbuild.yaml --project <PROJECT>
# (No push-trigger is configured, so $COMMIT_SHA is unset here - the image tag
#  uses the _TAG substitution below, default 'latest'.)
#
# Substitutions (set in the trigger or pass via --substitutions):
#   _SERVICE       - Cloud Run service name (default: outreachos-api)
#   _REGION        - GCP region (default: us-central1)
#   _AR_REPO       - Artifact Registry repo for images (default: outreachos)

steps:
  # 0. Gate the deploy on a green typecheck + test suite. A red build here stops
  #    the pipeline before the image is ever built, so broken code can't ship.
  - name: node:22
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        npm ci
        npm run server:typecheck
        npm test

  # 1. Build the image.
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:${_TAG}
      - .

  # 2. Push it.
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:${_TAG}

  # 3. Deploy to Cloud Run.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      # Keep CPU allocated after the HTTP response returns so the detached
      # pipeline driver (api/_lib/pipeline.ts: ensureDriving/driveLoop) keeps
      # advancing between the client's status polls instead of being throttled
      # to ~zero. min-instances stays at its default 0 (scale-to-zero, so no
      # always-on cost); an occasional poll keeps the instance alive while a run
      # is in flight.
      - --no-cpu-throttling
      - --timeout=3600
      - --concurrency=40
      # Pull all secrets from Secret Manager. Each secret name should match
      # the env var; create them with `gcloud secrets create <name>`.
      # SERPER_API_KEY, EMAILFINDER_API_KEY and MILLIONVERIFIER_API_KEY power the
      # contact-discovery + email-resolution cascade (api/_lib/email-resolver.ts);
      # each feature stays off unless its key resolves at runtime. STRIPE_SECRET_KEY,
      # STRIPE_WEBHOOK_SECRET and the 3 STRIPE_PRICE_* ids power billing. Every secret
      # listed here MUST exist in Secret Manager before deploy or this step fails (a
      # missing secret blocks the deploy).
      - --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,MONGODB_URI=MONGODB_URI:latest,VOYAGE_API_KEY=VOYAGE_API_KEY:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest,CRON_SECRET=CRON_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,SERPER_API_KEY=SERPER_API_KEY:latest,EMAILFINDER_API_KEY=EMAILFINDER_API_KEY:latest,MILLIONVERIFIER_API_KEY=MILLIONVERIFIER_API_KEY:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,STRIPE_PRICE_STARTER=STRIPE_PRICE_STARTER:latest,STRIPE_PRICE_PRO=STRIPE_PRICE_PRO:latest,STRIPE_PRICE_SCALE=STRIPE_PRICE_SCALE:latest
      - --set-env-vars=ANTHROPIC_MODEL=claude-sonnet-4-5,MONGODB_DB=outreachos,FIREBASE_PROJECT_ID=$PROJECT_ID,GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_REGION},GCS_BUCKET=$PROJECT_ID-assets,CLOUD_TASKS_QUEUE=outreach-jobs,APP_URL=https://outreach-os.ca

substitutions:
  _SERVICE: outreachos-api
  _REGION: us-central1
  _AR_REPO: outreachos
  # Image tag. Defaults to 'latest' so a manual `gcloud builds submit` works out
  # of the box. ($COMMIT_SHA is only auto-populated for push-triggered builds; a
  # manual submit leaves it empty -> malformed `:` tag -> docker 125.) Pass
  # --substitutions=_TAG=$(git rev-parse HEAD) when you want a pinned image tag.
  _TAG: latest

options:
  logging: CLOUD_LOGGING_ONLY
